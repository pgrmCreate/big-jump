<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>AR Art Viewer</title>

        <!-- Import map : indique au navigateur où se trouvent les modules -->
        <script type="importmap">
            {
              "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
              }
            }
        </script>

        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- Sélecteur d’œuvre -->
        <header>
            <select id="artSelect"></select>
        </header>

        <!-- Bouton AR -->
        <div id="arButtonContainer"></div>

        <!-- Feedback -->
        <div id="feedback"></div>

        <!-- FABs -->
        <button id="resetBtn">🎯</button>
        <button id="gizmoBtn" hidden>⚙️</button>
        <button id="depthBtn" hidden>↕︎</button>

        <!-- Panneau gizmo -->
        <div id="toolPanel">
            <div class="row top">
                <span id="posVal">0,0,0</span>
                <span id="rotVal">0,0,0</span>
            </div>

            <div class="row mode">
                <button class="mode-btn active" data-mode="translate">Trans</button>
                <button class="mode-btn" data-mode="rotate">Rot</button>
            </div>

            <div class="row axes">
                <button class="axis-btn active" data-axis="x">X</button>
                <button class="axis-btn" data-axis="y">Y</button>
                <button class="axis-btn" data-axis="z">Z</button>
            </div>

            <input id="adjustSlider" type="range" min="-3" max="3" step="0.01" value="0">

            <div class="row bottom">
                <button id="snapBtn">Snap</button>
                <button id="resetGizmo">Reset</button>
            </div>
        </div>

        <!-- Slider vertical profondeur -->
        <div id="depthSliderCont">
            <input id="depthSlider" type="range" min="-3" max="3" step="0.1" value="0">
        </div>

        <!-- Code principal -->
        <script type="module" src="script.js"></script>
    </body>
</html>
